    <script>
      // Redirect goseethecity.com root visitors to hariet.ai immediately,
      // before any React/app code runs (no flash of content).
      (function () {
        try {
          var host = window.location.hostname;
          var path = window.location.pathname;
          if (
            (host === "goseethecity.com" || host === "www.goseethecity.com") &&
            (path === "/" || path === "")
          ) {
            window.location.replace("https://hariet.ai");
          }
        } catch (e) {}
      })();
    </script>
